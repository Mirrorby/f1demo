<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh}
img{max-width:100%;display:block}
a{text-decoration:none}
button{font-family:inherit;cursor:pointer}

:root{
  --red:#e10600;
  --red-dark:#b00500;
  --surface:#111;
  --surface2:#1a1a1a;
  --surface3:#222;
  --border:#2a2a2a;
  --text:#f0f0f0;
  --muted:#888;
  --dim:#555;
  --radius:10px;
  --rsm:6px;
}

/* ── Hero ── */
.hero{position:relative;padding:4rem 1.5rem 3rem;overflow:hidden;text-align:center;background:#0a0a0a}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,#fff 0,#fff 18px,#000 18px,#000 36px)}
.hero-lines{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.hero-lines span{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--red-rgb),.35),transparent);animation:sl 3s linear infinite;opacity:0}
.hero-lines span:nth-child(1){top:28%;width:60%;left:-60%;animation-delay:0s}
.hero-lines span:nth-child(2){top:48%;width:80%;left:-80%;animation-delay:.8s}
.hero-lines span:nth-child(3){top:68%;width:50%;left:-50%;animation-delay:1.6s}
.hero-lines span:nth-child(4){top:38%;width:70%;left:-70%;animation-delay:2.2s}
@keyframes sl{0%{left:-80%;opacity:0}10%{opacity:1}90%{opacity:1}100%{left:110%;opacity:0}}
.hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:3px;margin-bottom:1.25rem}
.hero-title{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;line-height:1.1;letter-spacing:-.02em;color:#fff;margin-bottom:.75rem}
.hero-subtitle{font-size:clamp(.9rem,2vw,1.05rem);color:var(--muted);line-height:1.6;max-width:480px;margin:0 auto 1.5rem}
.hero-contacts{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.hero-link{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--rsm);font-size:13px;font-weight:600;border:1px solid var(--border);color:var(--muted);transition:all .2s}
.hero-link:hover{color:#fff;border-color:#444}
.hero-link svg{width:16px;height:16px;flex-shrink:0}

/* ── Layout ── */
.container{max-width:1000px;margin:0 auto;padding:0 1rem}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;gap:10px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.fbtn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;background:transparent;color:var(--muted);transition:all .15s}
.fbtn:hover{border-color:#444;color:var(--text)}
.fbtn.active{background:var(--red);color:#fff;border-color:var(--red)}
.cart-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:600;transition:border-color .15s;white-space:nowrap}
.cart-btn:hover{border-color:#444}
.cart-badge{background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;min-width:20px;text-align:center}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;padding-bottom:2rem}

/* ── Card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.card:hover{border-color:#333;transform:translateY(-2px)}
.card-img{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:42px;position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.avail-pill{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.pill-yes{background:var(--red);color:#fff}
.pill-no{background:rgba(255,255,255,.08);color:var(--dim)}
.card-body{padding:10px 12px}
.card-team{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:2px;display:flex;flex-wrap:wrap;gap:4px}
.card-meta span{background:var(--surface3);border-radius:3px;padding:1px 5px}
.card-sizes{font-size:11px;color:var(--muted);margin-bottom:8px}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.price{font-size:14px;font-weight:700;color:#fff}
.stock-num{font-size:10px;color:var(--dim);margin-top:1px}
.add-btn{display:flex;align-items:center;gap:4px;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);padding:5px 10px;font-size:11px;font-weight:600;transition:background .15s}
.add-btn:hover{background:var(--red-dark)}
.add-btn:disabled{background:var(--surface3);color:var(--dim);cursor:default}

/* ── Overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
@media(min-width:560px){.overlay{align-items:center;padding:1rem}}
.panel{background:var(--surface);border:1px solid var(--border);width:100%;max-width:440px;border-radius:var(--radius) var(--radius) 0 0;max-height:92vh;overflow-y:auto;position:relative}
@media(min-width:560px){.panel{border-radius:var(--radius)}}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.panel-title{font-size:14px;font-weight:700;color:var(--text)}
.close-btn{background:none;border:none;color:var(--muted);font-size:20px;display:flex;align-items:center;padding:2px;transition:color .15s}
.close-btn:hover{color:#fff}
.panel-body{padding:1.25rem}

/* ── Product modal ── */
.pm-visual{width:100%;aspect-ratio:1;max-height:200px;background:var(--surface2);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:1rem;overflow:hidden}
.pm-visual img{width:100%;height:100%;object-fit:cover}
.pm-team{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.pm-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.pm-attrs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.pm-attr{font-size:11px;background:var(--surface3);border-radius:3px;padding:3px 7px;color:var(--muted)}
.pm-attr b{color:var(--text);font-weight:600}
.pm-price{font-size:22px;font-weight:800;color:var(--red);margin-bottom:1.25rem}
.field-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.size-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem}
.size-btn{padding:6px 14px;border-radius:var(--rsm);border:1px solid var(--border);font-size:13px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s}
.size-btn:hover{border-color:#444;color:#fff}
.size-btn.sel{background:var(--red);color:#fff;border-color:var(--red)}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.qty-btn{width:34px;height:34px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.qty-btn:hover{border-color:#444}
.qty-val{font-size:16px;font-weight:700;color:#fff;min-width:28px;text-align:center}
.pm-add{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;transition:background .15s}
.pm-add:hover{background:var(--red-dark)}
.pm-add:disabled{background:var(--surface3);color:var(--dim)}

/* ── Cart ── */
.cart-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:14px}
.cart-empty svg{width:36px;height:36px;margin:0 auto 10px;opacity:.3}
.ci{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.ci-emoji{font-size:28px;flex-shrink:0;line-height:1.1;width:36px;text-align:center}
.ci-img{width:40px;height:40px;border-radius:5px;object-fit:cover;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ci-qrow{display:flex;align-items:center;gap:7px;margin-top:6px}
.ci-qbtn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.ci-qbtn:hover{border-color:#444}
.ci-qval{font-size:13px;font-weight:600;color:#fff;min-width:18px;text-align:center}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.ci-price{font-size:13px;font-weight:700;color:#fff}
.ci-del{background:none;border:none;color:var(--dim);font-size:16px;padding:2px;transition:color .15s}
.ci-del:hover{color:#e10600}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:14px;font-weight:700;color:#fff}
.cart-actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.oa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--rsm);font-size:14px;font-weight:700;border:none;transition:opacity .15s}
.oa:hover{opacity:.88}
.oa-wa{background:#25D366;color:#fff}
.oa-ig{background:#C13584;color:#fff}
.oa-clear{background:transparent;border:1px solid var(--border)!important;color:var(--muted)!important;font-size:13px!important;padding:9px!important}
.oa-clear:hover{border-color:#444!important;color:#fff!important}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── Loading / States ── */
.state-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px;grid-column:1/-1}
.dot{display:inline-block;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── Footer ── */
.footer{border-top:1px solid var(--border);padding:1.5rem 0;text-align:center;color:var(--dim);font-size:12px}
.footer-checker{height:4px;background:repeating-linear-gradient(90deg,#fff 0,#fff 12px,#000 12px,#000 24px);margin-bottom:1rem;opacity:.15}

@media(max-width:400px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .hero{padding:3rem 1rem 2rem}
}
</style>
</head>

<script>
/* ════════════════════════════════════════
   ДЕФОЛТНЫЕ НАСТРОЙКИ
   Используются если лист "Настройки" не подключён
════════════════════════════════════════ */
const DEFAULTS = {
  hero_title:       "Официальный F1 мерч",
  hero_subtitle:    "Коллекция одежды и аксессуаров команд Формулы 1. Быстрая доставка по всей России.",
  site_title:       "Pit Stop Merch",
  footer_text:      "© Pit Stop Merch — заказ через WhatsApp и Instagram",
  whatsapp:         "79001234567",
  instagram:        "pitstop_merch",
  accent_color:     "#e10600",
  btn_cart:         "Корзина",
  btn_order_wa:     "Заказать в WhatsApp",
  btn_order_ig:     "Написать в Instagram",
  btn_add:          "В корзину",
  btn_add_size:     "Выберите размер",
  btn_clear:        "Очистить корзину",
  label_size:       "Размер",
  label_qty:        "Количество",
  label_year:       "Год",
  label_color:      "Цвет",
  label_number:     "Номер",
  label_stock:      "В наличии",
  label_no_stock:   "Нет",
  label_total:      "Итого",
  label_pick:       "Выбрать параметры",
  filter_all:       "Все",
  msg_empty_cart:   "Корзина пуста",
  msg_added:        "Добавлено в корзину ✓",
  wa_msg_header:    "Привет! Хочу сделать заказ:",
  wa_msg_footer:    "",
};

let S = {...DEFAULTS}; // активные настройки (после загрузки листа)
let products = [];
let cart = [];
let activeCat = "";

/* ════ CSV PARSER ════ */
function parseCSV(text) {
  const rows = text.trim().split(/\r?\n/).map(row => {
    const cells = []; let cur = "", inQ = false;
    for (let i = 0; i < row.length; i++) {
      if (row[i] === '"') { inQ = !inQ; }
      else if (row[i] === ',' && !inQ) { cells.push(cur.trim()); cur = ""; }
      else { cur += row[i]; }
    }
    cells.push(cur.trim());
    return cells;
  });
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim()
    .replace(/ё/g,'е').replace(/\s+/g,'_')
    .replace(/[^a-zа-я0-9_]/gi,''));
  return rows.slice(1).filter(r => r.some(c => c)).map((r, i) => {
    const o = { _row: i + 2 };
    headers.forEach((h, j) => o[h] = (r[j] || "").trim());
    return o;
  });
}

/* ════ LOAD SETTINGS ════ */
async function loadSettings() {
  if (!CSV.settings) return;
  try {
    const r = await fetch(CSV.settings);
    const rows = parseCSV(await r.text());
    rows.forEach(row => {
      // ищем столбцы "ключ" и "значение" (или key/value)
      const k = row['ключ'] || row['key'] || row['клю'] || "";
      const v = row['значение'] || row['value'] || row['значени'] || "";
      if (k && v !== undefined) S[k.trim()] = v.trim();
    });
  } catch(e) { console.warn("Settings CSV failed, using defaults", e); }
}

async function loadCatalog() {
  if (!CSV.catalog) { products = normRows(DEMO); return; }
  try {
    const r = await fetch(CSV.catalog);
    products = normRows(parseCSV(await r.text()));
  } catch(e) {
    console.warn("Catalog CSV failed, using demo", e);
    products = normRows(DEMO);
  }
}

function normRows(rows) {
  return rows.map((r, i) => ({
    id:         i + 1,
    name:       r['название']   || r['name']     || "",
    team:       r['команда']    || r['team']      || "",
    cat:        r['категория']  || r['cat']       || "Прочее",
    sizes:      (r['размеры']   || r['sizes']     || "").replace(/\s/g,""),
    price:      parseInt((r['цена'] || r['price'] || "0").replace(/\D/g,"")) || 0,
    avail:      (r['наличие']   || r['avail']     || "да").toLowerCase(),
    photo:      r['фото']       || r['photo']     || "",
    emoji:      r['эмодзи']     || r['emoji']     || "🏁",
    year:       r['год']        || r['year']      || "",
    color:      r['цвет']       || r['color']     || "",
    stock_qty:  r['количество'] || r['quantity']  || "",
    number:     r['номер']      || r['number']    || "",
  }));
}

/* ════ APPLY SETTINGS TO DOM ════ */
function applySettings() {
  // accent color
  const ac = S.accent_color || "#e10600";
  document.documentElement.style.setProperty('--red', ac);
  document.documentElement.style.setProperty('--red-dark', shadeHex(ac, -30));

  document.title                                  = S.site_title       || "F1 Merch";
  document.getElementById("hero-title").textContent  = S.hero_title;
  document.getElementById("hero-subtitle").textContent = S.hero_subtitle;
  document.getElementById("footer-text").textContent = S.footer_text;
  document.getElementById("hero-wa").href         = "https://wa.me/" + S.whatsapp;
  document.getElementById("hero-ig").href         = "https://instagram.com/" + S.instagram;
  document.getElementById("lbl-cart").textContent  = S.btn_cart;
  document.getElementById("lbl-cart-title").textContent = S.btn_cart;
  document.getElementById("lbl-pick").textContent  = S.label_pick;
  document.getElementById("lbl-size-h").textContent = S.label_size;
  document.getElementById("lbl-qty-h").textContent  = S.label_qty;
}

function shadeHex(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (n >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((n >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (n & 0xff) + amt));
  return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ════ RENDER ════ */
function getCats() {
  return [S.filter_all || "Все", ...new Set(products.map(p => p.cat))];
}

function renderFilters() {
  if (!activeCat) activeCat = S.filter_all || "Все";
  document.getElementById("filters").innerHTML = getCats().map(c =>
    `<button class="fbtn${c === activeCat ? " active" : ""}" onclick="setF(${JSON.stringify(c)})">${c}</button>`
  ).join("");
}

function setF(c) { activeCat = c; renderFilters(); renderGrid(); }

function fmt(n) { return Number(n).toLocaleString("ru-RU") + " ₽"; }

function isAvail(p) {
  return ["да","yes","1","true","in stock"].includes(p.avail.toLowerCase());
}

function driveThumb(url, size) {
  const m = url.match(/\/d\/([^/]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w${size}`;
  return url;
}

function imgOrEmoji(p, size) {
  if (p.photo) {
    const src = driveThumb(p.photo, size);
    return `<img src="${src}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`;
  }
  return p.emoji || "🏁";
}

function renderGrid() {
  const all = S.filter_all || "Все";
  const list = activeCat === all ? products : products.filter(p => p.cat === activeCat);
  const grid = document.getElementById("grid");
  if (!list.length) {
    grid.innerHTML = `<div class="state-msg">Нет товаров в этой категории</div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const ok = isAvail(p);
    const meta = [
      p.year   ? `<span>${p.year}</span>` : "",
      p.color  ? `<span>${p.color}</span>` : "",
      p.number ? `<span>#${p.number}</span>` : "",
    ].join("");
    return `
    <div class="card" onclick="openProduct(${p.id})">
      <div class="card-img">
        ${imgOrEmoji(p, 400)}
        <span class="avail-pill ${ok ? "pill-yes" : "pill-no"}">${ok ? S.label_stock : S.label_no_stock}</span>
      </div>
      <div class="card-body">
        <div class="card-team">${p.team}</div>
        <div class="card-name">${p.name}</div>
        ${meta ? `<div class="card-meta">${meta}</div>` : ""}
        <div class="card-sizes">${p.sizes.split(",").filter(Boolean).join(" · ")}</div>
        <div class="card-foot">
          <div>
            <div class="price">${fmt(p.price)}</div>
            ${p.stock_qty ? `<div class="stock-num">${p.stock_qty} шт.</div>` : ""}
          </div>
          <button class="add-btn" ${!ok ? "disabled" : ""} onclick="event.stopPropagation();openProduct(${p.id})">
            + ${S.btn_add}
          </button>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ════ PRODUCT MODAL ════ */
let curP = null, curSize = null, curQty = 1;

function openProduct(id) {
  const p = products.find(x => x.id === id);
  if (!isAvail(p)) return;
  curP = p; curQty = 1;
  const szArr = p.sizes.split(",").map(s => s.trim()).filter(Boolean);
  curSize = szArr.length === 1 ? szArr[0] : null;

  const vis = document.getElementById("pm-visual");
  if (p.photo) {
    const src = driveThumb(p.photo, 400);
    vis.innerHTML = `<img src="${src}" alt="${p.name}" onerror="this.innerHTML='${p.emoji}'">`;
  } else { vis.innerHTML = p.emoji || "🏁"; }

  document.getElementById("pm-team").textContent = p.team;
  document.getElementById("pm-name").textContent = p.name;
  document.getElementById("pm-price").textContent = fmt(p.price);
  document.getElementById("pm-qty").textContent = "1";

  // атрибуты: год, цвет, номер
  const attrs = [
    p.year   ? `<span class="pm-attr"><b>${S.label_year}:</b> ${p.year}</span>` : "",
    p.color  ? `<span class="pm-attr"><b>${S.label_color}:</b> ${p.color}</span>` : "",
    p.number ? `<span class="pm-attr"><b>${S.label_number}:</b> #${p.number}</span>` : "",
  ].join("");
  document.getElementById("pm-attrs").innerHTML = attrs;

  document.getElementById("pm-sizes").innerHTML = szArr.map(s =>
    `<button class="size-btn${curSize === s ? " sel" : ""}" onclick="selSz('${s}')">${s}</button>`
  ).join("");
  updAddBtn();
  document.getElementById("pm-ov").classList.add("open");
}

function selSz(s) {
  curSize = s;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.toggle("sel", b.textContent === s));
  updAddBtn();
}

function chQty(d) {
  curQty = Math.max(1, Math.min(99, curQty + d));
  document.getElementById("pm-qty").textContent = curQty;
}

function updAddBtn() {
  const btn = document.getElementById("pm-add");
  btn.disabled = !curSize;
  btn.textContent = curSize ? S.btn_add : S.btn_add_size;
}

/* ════ CART ════ */
function addToCart() {
  if (!curSize || !curP) return;
  const key = curP.id + "|" + curSize;
  const ex = cart.find(x => x.key === key);
  if (ex) { ex.qty += curQty; }
  else { cart.push({ key, id: curP.id, name: curP.name, team: curP.team, emoji: curP.emoji, photo: curP.photo, size: curSize, qty: curQty, price: curP.price, year: curP.year, color: curP.color, number: curP.number }); }
  updCount();
  closeId("pm-ov");
  showToast(S.msg_added);
}

function updCount() {
  document.getElementById("cart-count").textContent = cart.reduce((s, x) => s + x.qty, 0);
}

function openCart() { renderCart(); document.getElementById("cart-ov").classList.add("open"); }

function renderCart() {
  const body = document.getElementById("cart-body");
  if (!cart.length) {
    body.innerHTML = `<div class="cart-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      ${S.msg_empty_cart}
    </div>`;
    return;
  }
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);

  const items = cart.map((it, i) => {
    const thumb = it.photo
      ? `<img class="ci-img" src="${driveThumb(it.photo, 80)}" alt="" onerror="this.style.display='none'">`
      : `<div class="ci-emoji">${it.emoji}</div>`;
    const sub = [
      `${S.label_size}: ${it.size}`,
      it.color  ? `${S.label_color}: ${it.color}` : "",
      it.number ? `#${it.number}` : "",
    ].filter(Boolean).join(" · ");
    return `
    <div class="ci">
      ${thumb}
      <div class="ci-info">
        <div class="ci-name">${it.name}</div>
        <div class="ci-sub">${sub}</div>
        <div class="ci-qrow">
          <button class="ci-qbtn" onclick="ciQ(${i},-1)">−</button>
          <span class="ci-qval">${it.qty}</span>
          <button class="ci-qbtn" onclick="ciQ(${i},1)">+</button>
        </div>
      </div>
      <div class="ci-right">
        <button class="ci-del" onclick="ciDel(${i})" aria-label="Удалить">✕</button>
        <div class="ci-price">${fmt(it.price * it.qty)}</div>
      </div>
    </div>`;
  }).join("");

  body.innerHTML = items +
    `<div class="cart-total"><span>${S.label_total}</span><span>${fmt(total)}</span></div>
    <div class="cart-actions">
      <a class="oa oa-wa" href="${buildWA()}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.555 4.122 1.528 5.857L0 24l6.335-1.652A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.64-.514-5.145-1.406l-.369-.219-3.762.981.999-3.665-.24-.378A9.956 9.956 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
        ${S.btn_order_wa}
      </a>
      <a class="oa oa-ig" href="https://instagram.com/${S.instagram}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        ${S.btn_order_ig}
      </a>
      <button class="oa oa-clear" onclick="clearCart()">${S.btn_clear}</button>
    </div>`;
}

function buildWA() {
  let msg = (S.wa_msg_header || "Хочу сделать заказ:") + "\n\n";
  cart.forEach(it => {
    const attrs = [
      `${S.label_size}: ${it.size}`,
      it.color  ? `${S.label_color}: ${it.color}` : "",
      it.number ? `#${it.number}` : "",
    ].filter(Boolean).join(", ");
    msg += `• ${it.name} (${attrs})\n  ${it.qty} шт. — ${fmt(it.price * it.qty)}\n`;
  });
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  msg += `\n${S.label_total}: ${fmt(total)}`;
  if (S.wa_msg_footer) msg += "\n" + S.wa_msg_footer;
  return `https://wa.me/${S.whatsapp}?text=${encodeURIComponent(msg)}`;
}

function ciQ(i, d) { cart[i].qty = Math.max(1, cart[i].qty + d); updCount(); renderCart(); }
function ciDel(i) { cart.splice(i, 1); updCount(); renderCart(); }
function clearCart() { cart = []; updCount(); renderCart(); }

function closeOv(e, id) { if (e.target.id === id) document.getElementById(id).classList.remove("open"); }
function closeId(id) { document.getElementById(id).classList.remove("open"); }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

/* ════ BOOT ════ */
async function init() {
  await Promise.all([loadSettings(), loadCatalog()]);
  applySettings();
  activeCat = S.filter_all || "Все";
  renderFilters();
  renderGrid();
}

init();
</script>
